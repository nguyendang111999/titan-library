<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan Library - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="logo text-center">
        <h1>📚 Titan Library</h1>
        <p style="color: var(--secondary-color); margin-top: 0.5rem;">Welcome back! Please login to continue.</p>
      </div>
      
      <div id="alert" class="alert"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="Enter your email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Login
        </button>
      </form>

      <div style="text-align: center; margin: 1rem 0; color: var(--secondary-color);">or</div>

      <button type="button" id="googleSignInBtn" class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="margin-top: 1rem;">Logging in...</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { login, googleSignIn } from './js/auth.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { auth } from './js/firebase-config.js';

    const loginForm = document.getElementById('loginForm');
    const alertDiv = document.getElementById('alert');
    const loadingDiv = document.getElementById('loading');
    const googleSignInBtn = document.getElementById('googleSignInBtn');

    // Flag to prevent onAuthStateChanged from redirecting during Google sign-in
    let isSigningIn = false;

    // Check if already logged in
    onAuthStateChanged(auth, async (user) => {
      if (user && !isSigningIn) {
        // User is already logged in, redirect to appropriate dashboard
        try {
          const { userData } = await import('./js/auth.js').then(m => m.checkAuth());
          if (userData.role === 'admin') {
            window.location.href = 'admin/dashboard.html';
          } else {
            window.location.href = 'user/dashboard.html';
          }
        } catch (error) {
          console.log('Not authenticated yet');
        }
      }
    });

    function showAlert(message, type) {
      alertDiv.textContent = message;
      alertDiv.className = `alert alert-${type} show`;
      setTimeout(() => {
        alertDiv.className = 'alert';
      }, 5000);
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      loginForm.style.display = 'none';
      loadingDiv.classList.add('show');
      
      try {
        const result = await login(email, password);
        
        showAlert('Login successful! Redirecting...', 'success');
        
        // Redirect based on role
        if (result.role === 'admin') {
          window.location.href = 'admin/dashboard.html';
        } else {
          window.location.href = 'user/dashboard.html';
        }
      } catch (error) {
        loginForm.style.display = 'block';
        loadingDiv.classList.remove('show');
        
        let errorMessage = 'Login failed. Please try again.';
        if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          errorMessage = 'Invalid email or password.';
        } else if (error.code === 'auth/too-many-requests') {
          errorMessage = 'Too many failed attempts. Please try again later.';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = 'Invalid email format.';
        }
        
        showAlert(errorMessage, 'error');
      }
    });

    // Google sign-in
    googleSignInBtn.addEventListener('click', async () => {
      isSigningIn = true;
      loginForm.style.display = 'none';
      googleSignInBtn.style.display = 'none';
      loadingDiv.classList.add('show');

      try {
        const result = await googleSignIn();

        showAlert('Login successful! Redirecting...', 'success');

        if (result.role === 'admin') {
          window.location.href = 'admin/dashboard.html';
        } else {
          window.location.href = 'user/dashboard.html';
        }
      } catch (error) {
        loginForm.style.display = 'block';
        googleSignInBtn.style.display = 'flex';
        loadingDiv.classList.remove('show');
        isSigningIn = false;

        showAlert(error.message || 'Google sign-in failed. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
